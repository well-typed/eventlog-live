services:
  oddball:
    # container_name: oddball
    build:
      context: ".."
      dockerfile: "./demo/Dockerfile.oddball"
    volumes:
      - "oddball:/run/oddball"
    environment:
      GHC_EVENTLOG_UNIX_PATH: "/run/oddball/ghc_eventlog.sock"
      LANG: C.UTF-8
    command:
      - "+RTS"
      - "-l"
      - "-hT"
      - "--eventlog-flush-interval=1"
      - "-RTS"

  eventlog-live-otelcol:
    # container_name: eventlog-live-otelcol
    build:
      context: ".."
      dockerfile: "./demo/Dockerfile.eventlog-live-otelcol"
    depends_on:
      oddball:
        condition: "service_started"
      otelcol:
        condition: "service_started"
    ports:
      - "30179:30179"
    volumes:
      - "oddball:/run/oddball"
      - "./config/eventlog-live-otelcol.yaml:/etc/eventlog-live-otelcol/config.yaml"
    environment:
      LANG: C.UTF-8
    command:
      - "--verbosity=debug"
      - "--config=/etc/eventlog-live-otelcol/config.yaml"
      - "--service-name=oddball"
      - "--eventlog-socket=/run/oddball/ghc_eventlog.sock"
      - "-hT"
      - "--eventlog-flush-interval=1"
      - "--otelcol-host=otelcol"
      - "--control"
      - "--control-port=30719"
      - "--control-cors-ignore-failure"

  grafana:
    # container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    healthcheck:
      test: "curl -f http://localhost:3000/api/health"
      interval: 1m
      timeout: 10s
      retries: 5
    environment:
      GF_PLUGINS_PREINSTALL: "grafana-pyroscope-app"
    volumes:
      - "./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml"
      - "./config/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml"
      - "./config/grafana-dashboards:/var/lib/grafana/dashboards"

  loki:
    # container_name: loki
    image: grafana/loki:latest
    command:
      - "--config.file=/etc/loki/config.yaml"
    ports:
      - "3100"
    volumes:
      - "./config/loki.yaml:/etc/loki/config.yaml"

  otelcol:
    # container_name: otelcol
    image: otel/opentelemetry-collector-contrib:latest
    depends_on:
      loki:
        condition: "service_started"
      prometheus:
        condition: "service_started"
      tempo:
        condition: "service_started"
    command:
      - "--config=/etc/otelcol/config.yaml"
      - "--feature-gates=service.profilesSupport"
    volumes:
      - "./config/otelcol.yaml:/etc/otelcol/config.yaml"
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "55679:55679" # zPages extension

  prometheus:
    # container_name: prometheus
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    volumes:
      - "./config/prometheus.yaml:/etc/prometheus/prometheus.yaml"
    ports:
      - "9090:9090" # Prometheus

  pyroscope:
    # container_name: pyroscope
    image: grafana/pyroscope:1.16.0
    command: ["-config.file=/etc/pyroscope.yaml"]
    volumes:
      - "./config/pyroscope.yaml:/etc/pyroscope.yaml"
    ports:
      - 4040:4040 # Pyroscope

  tempo:
    # container_name: tempo
    #
    # 2026-04-27:
    # The latest version of grafana/tempo doesn't work with the configuration
    # used in this example, and grafana/tempo only publishes tags that include
    # the architecture of the image. Therefore, we need this nightmare hack to
    # enable running the docker compose file on both supported architectures.
    #
    # If you're on arm64, you should set ARCH to arm64, e.g.,
    #
    # ARCH=arm64 docker compose -f demo/eventlog-live-otelcol/docker-compose-external.yml up -d
    #
    image: grafana/tempo:main-93b3140-${ARCH:-amd64}
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - "./config/tempo.yaml:/etc/tempo.yaml"
    ports:
      - "3200:3200" # Tempo
      - "24317:24317" # OTLP gRPC receiver
      - "24318:24318" # OTLP HTTP receiver

volumes:
  oddball:
